name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  app:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
        working-directory: app
      - name: Analyze (must be clean)
        run: flutter analyze
        working-directory: app
      - name: Run tests
        run: flutter test
        working-directory: app

  functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
        working-directory: functions
      - name: Lint
        run: npm run lint
        working-directory: functions
      - name: Unit tests
        run: npm test
        working-directory: functions
      - name: Build TypeScript
        run: npm run build
        working-directory: functions

  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install rules test deps
        run: npm ci
        working-directory: rules-tests
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Run security rules tests
        run: firebase emulators:exec --only firestore --project demo-event-horizon "npm --prefix rules-tests test"