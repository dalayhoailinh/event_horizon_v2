name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  app:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
        working-directory: app
      - name: Analyze (must be clean)
        run: flutter analyze
        working-directory: app
      - name: Run tests
        run: flutter test
        working-directory: app

  functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
        working-directory: functions
      - name: Lint
        run: npm run lint
        working-directory: functions
      - name: Build TypeScript
        run: npm run build
        working-directory: functions
